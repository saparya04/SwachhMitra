<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BEACH CLEANUP – Poster</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white:       #ffffff;
    --offwhite:    #e8efe8;
    --accent:      #a8d8a8;
    --gold:        #c9a84c;
    --dark-green:  #0d3320;
    --deep:        #020d07;
    --card-w:      520px;
    --card-h:      740px;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #020d07;
    font-family: 'Montserrat', sans-serif;
  }

  /* ── Poster card ─────────────────────────────────────────── */
  .poster {
    position: relative;
    width:  var(--card-w);
    height: var(--card-h);
    overflow: hidden;
    border-radius: 18px;
    box-shadow: 0 30px 80px rgba(0,0,0,.8), 0 0 0 1px rgba(168,216,168,.12);
    background: radial-gradient(ellipse at 60% 30%, #0d3320 0%, #061a0f 40%, #020d07 100%),url("data:image/svg+xml,%3Csvg width='600' height='800' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='300' cy='300' r='280' fill='%230a2a18' opacity='0.6'/%3E%3C/svg%3E") center/cover;
  }

  /* dark vignette overlay so text is always readable */
  .poster::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%,   transparent 40%, rgba(2,13,7,.55) 100%),
      linear-gradient(to bottom, rgba(2,13,7,.10) 0%, rgba(2,13,7,.15) 45%, rgba(2,13,7,.82) 68%, rgba(2,13,7,.97) 100%);
    z-index: 1;
  }

  /* subtle green shimmer top-right */
  .poster::after {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(40,120,60,.18) 0%, transparent 70%);
    z-index: 1;
    pointer-events: none;
  }

  /* ── Content layer ───────────────────────────────────────── */
  .content {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 38px 42px;
  }

  /* decorative thin top bar */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: .5;
  }

  /* ── Script headline ──────────────────────────────────────── */
  .headline {
    font-family: 'Dancing Script', cursive;
    font-size: 68px;
    line-height: 1;
    color: var(--white);
    letter-spacing: -1px;
    text-shadow: 0 2px 20px rgba(0,0,0,.6);
    margin-bottom: 2px;
  }
  .headline span {
    color: var(--accent);
  }

  /* ── Event title (all-caps) ──────────────────────────────── */
  .event-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* ── Divider ─────────────────────────────────────────────── */
  .divider {
    width: 44px;
    height: 2px;
    background: var(--accent);
    margin-bottom: 16px;
    opacity: .7;
  }

  /* ── Invite copy ─────────────────────────────────────────── */
  .invite {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 14.5px;
    line-height: 1.7;
    color: rgba(232,239,232,.78);
    margin-bottom: 20px;
  }
  .invite p { margin: 0; }

  /* ── Details grid ────────────────────────────────────────── */
  .details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 18px;
    margin-bottom: 22px;
  }
  .detail-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .detail-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: .7;
  }
  .detail-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: .3px;
  }

  /* ── Volunteers banner ───────────────────────────────────── */
  .volunteers {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(201,168,76,.13);
    border: 1px solid rgba(201,168,76,.35);
    border-radius: 6px;
    padding: 9px 16px;
    color: var(--gold);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .8px;
  }
  .volunteers svg {
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="poster">
  <div class="top-bar"></div>

  <div class="content">
    <!-- Script header that mirrors "Nature." from template -->
    <div class="headline">Nature<span>.</span></div>

    <!-- Event title sits right below in uppercase tracking -->
    <div class="event-title">BEACH CLEANUP</div>

    <div class="divider"></div>

    <!-- Invite copy -->
    <div class="invite">
      <p>Join us in our mission to create a cleaner, greener,</p><p>and more beautiful beach! We warmly invite you to</p><p>participate in our cleanup drive, where we will unite</p><p>to protect our ocean and coastline.</p>
    </div>

    <!-- Date / Time / Location / Volunteers -->
    <div class="details">
      <div class="detail-item">
        <span class="detail-label">Date</span>
        <span class="detail-value">Date TBD</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Time</span>
        <span class="detail-value">9:00</span>
      </div>
      <div class="detail-item" style="grid-column: 1 / -1;">
        <span class="detail-label">Location</span>
        <span class="detail-value">Mumbai</span>
      </div>
    </div>

    <div class="volunteers">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Volunteers Required: 50
    </div>
  </div>
</div>
</body>
</html>
